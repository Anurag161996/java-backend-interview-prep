<!DOCTYPE html>
<html lang="en">
<head>

<body>

<!-- NAV -->
<nav class="nav">
  <a class="logo" href="#" onclick="goHome();return false;">Java<em>Prep</em></a>
  <div class="nsearch">
    <span class="nsearch-icon">⌕</span>
    <input type="text" id="gSearch" placeholder="Search topics or questions…" oninput="onSearch()" autocomplete="off"/>
  </div>
  <span class="nmeta" id="navMeta">0 Q · 17 topics</span>
</nav>

<!-- APP -->
<div id="mainApp">

  <!-- HOME -->
  <div id="homeView">
    <div class="hero">
      <div class="hero-glow"></div>
      <div class="hero-inner">
        <div class="hero-chip">📚 Java Backend Interview Guide</div>
        <h1>Master your<br><span class="ca">Java interview</span><br>with <span class="cg">confidence</span></h1>
        <p class="hero-sub">Master 499+ interview questions across 17 core backend topics — from Java fundamentals to system design.</p>
        <div class="filter-row" id="filterRow">
          <button class="fp on" onclick="setF('all',this)">All</button>
          <button class="fp" onclick="setF('java',this)">Java Core</button>
          <button class="fp" onclick="setF('spring',this)">Spring</button>
          <button class="fp" onclick="setF('data',this)">Data &amp; DB</button>
          <button class="fp" onclick="setF('infra',this)">Infra &amp; Cloud</button>
          <button class="fp" onclick="setF('arch',this)">Architecture</button>
          <button class="fp" onclick="setF('test',this)">Testing</button>
        </div>
      </div>
    </div>

    <div class="statsbar">
      <div class="sbi"><span class="sbn" id="totalQ">0</span><span class="sbl">Questions</span></div>
      <div class="sbi"><span class="sbn">17</span><span class="sbl">Topics</span></div>
      <div class="sbi"><span class="sbn">3</span><span class="sbl">Difficulty levels</span></div>
    </div>

    <div class="wrap">
      <div class="sec-row">
        <span class="sec-lbl" id="gridLbl">All Topics — 0</span>
      </div>
      <div class="tgrid" id="topicGrid"></div>
    </div>
  </div>

  <!-- TOPIC DETAIL -->
  <div id="topicView">
    <div class="wrap" style="padding-top:70px;">
      <button class="back" onclick="goHome()">← All topics</button>
      <div id="topicContent"></div>
    </div>
  </div>

</div>
